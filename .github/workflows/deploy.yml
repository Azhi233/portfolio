name: Deploy to Baota

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "dist/*"
          target: "/www/wwwroot/portfolio-web/dist/"
          strip_components: 1
          overwrite: true

      - name: Update backend and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            export PATH=/www/server/nodejs/v20.20.2/bin:$PATH
            echo "node: $(node -v || true)"
            echo "npm: $(npm -v || true)"
            echo "which node: $(which node || true)"
            echo "which npm: $(which npm || true)"
            cd /www/wwwroot/portfolio-web
            if [ ! -d .git ]; then
              echo "Repository not found. Please clone the repo to /www/wwwroot/portfolio-web first."
              exit 1
            fi
            for i in 1 2 3; do
              if git fetch origin main; then
                break
              fi
              if [ "$i" -eq 3 ]; then
                echo "git fetch failed after 3 attempts"
                exit 1
              fi
              echo "git fetch failed, retrying in 5s..."
              sleep 5
            done
            git reset --hard origin/main
            cd server
            npm ci --omit=dev
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart portfolio-server || pm2 start src/index.js --name portfolio-server
              pm2 save
            else
              nohup npm start >/tmp/portfolio-server.log 2>&1 &
            fi
