name: Deploy to Baota

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "dist/*"
          target: "/www/wwwroot/portfolio-web/dist/"
          strip_components: 1
          overwrite: true

      - name: Upload backend source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "server/**/*"
          target: "/www/wwwroot/portfolio-web/server/"
          strip_components: 1
          overwrite: true
          exclude: "server/.env,server/.env.*,server/node_modules/**,server/uploads/**"

      - name: Update backend dependencies and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            export PATH=/www/server/nodejs/v20.20.2/bin:$PATH
            cd /www/wwwroot/portfolio-web/server
            test -f package.json
            npm ci --omit=dev
            if command -v pm2 >/dev/null 2>&1; then
              pm2 start src/index.js --name portfolio-server --update-env || pm2 restart portfolio-server --update-env
              pm2 save
            else
              pkill -f "node src/index.js" || true
              nohup npm start >/tmp/portfolio-server.log 2>&1 &
            fi